name: Build SunMc Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --no-transfer-progress

      - name: Rename jar
        run: |
          cd target
          if [ -f SunMc-1.0.0-shaded.jar ]; then
            mv SunMc-1.0.0-shaded.jar SunMc-1.0.0.jar
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SunMc-1.0.0
          path: target/SunMc-1.0.0.jar
          retention-days: 30
